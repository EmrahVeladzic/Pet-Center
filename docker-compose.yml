  #  build:
  #    context: .
  #    dockerfile: API/PetCenterApi/Dockerfile
  #  environment:
  #    - ConnectionStrings__DefaultConnection=Server=mssql;Database=${DB_NAME};User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=True;
  #    - RABBITMQ_HOSTNAME=${RABBITMQ_HOSTNAME}
  #    - RABBITMQ_QUEUENAME=${RABBITMQ_QUEUENAME}
  #    - RABBITMQ_USERNAME=${RABBITMQ_USERNAME}
  #    - RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD}
  #    - INSTANCE_OWNER_CONTACT=${INSTANCE_OWNER_CONTACT}
  #    - INSTANCE_OWNER_PASSWORD=${INSTANCE_OWNER_PASSWORD}
  #  depends_on:
  #    mssql:
  #      condition: service_healthy
  #    rabbitmq:
  #      condition: service_started
  #  networks:
  #    - petcenter-network
  #  deploy:
  #    resources:
  #      limits:
  #        memory: ${API_MEM_LIMIT:-512M}
  #      reservations:
  #        memory: ${API_MEM_RESERVE:-256M}

  email-consumer:
    build:
      context: .
      dockerfile: API/UserContactConsumer/Dockerfile
    environment:
      - RABBITMQ_HOSTNAME=${RABBITMQ_HOSTNAME}
      - RABBITMQ_QUEUENAME=${RABBITMQ_QUEUENAME}
      - RABBITMQ_USERNAME=${RABBITMQ_USERNAME}
      - RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD}
      - SMTP_USERNAME=${SMTP_USERNAME}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SMTP_SERVER=${SMTP_SERVER}
      - SMTP_PORT=${SMTP_PORT}
      - APP_EMAIL=${APP_EMAIL}      
    depends_on:
      - rabbitmq
    networks:
      - petcenter-network
    deploy:
      resources:
        limits:
          memory: ${CONSUMER_MEM_LIMIT:-256M}
        reservations:
          memory: ${CONSUMER_MEM_RESERVE:-128M}

  mailhog:
    image: mailhog/mailhog:latest
    container_name: mailhog
    environment:
      - MH_STORAGE=memory
      - MH_MAX_MESSAGES=50
    ports:
      - "1025:1025" 
      - "8025:8025" 
    networks:
      - petcenter-network

networks:
  petcenter-network:
    driver: bridge

volumes:
  mssql_data:
