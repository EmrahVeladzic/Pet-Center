services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: mssql
    environment:
      - ACCEPT_EULA=Y    
      - SA_PASSWORD=${SA_PASSWORD}
    ports:
      - "1433:1433"
    volumes:
      - mssql_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$${SA_PASSWORD}\" -C -Q 'SELECT 1'"]
      interval: 20s
      retries: 15
    networks:
      - petcenter-network
    deploy:
      resources:
        limits:
          memory: ${MSSQL_MEM_LIMIT:-4G}
        reservations:
          memory: ${MSSQL_MEM_RESERVE:-2G}

  mssql-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    depends_on:
      mssql:
        condition: service_healthy
    environment:
      - SA_PASSWORD=${SA_PASSWORD}
      - DB_NAME=${DB_NAME}
    volumes:
      - ./DB/PetCenterDB.sql:/PetCenterDB.sql:ro
    entrypoint: >
      bash -c "/opt/mssql-tools18/bin/sqlcmd -S mssql -U sa -P \"$SA_PASSWORD\" -C -v DB_NAME=\"$DB_NAME\" -i /PetCenterDB.sql"
    restart: "no"
    networks:
      - petcenter-network

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USERNAME}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASSWORD}
    ports:
      - "5672:5672"   
      - "15672:15672" 
    networks:
      - petcenter-network
    deploy:
      resources:
        limits:
          memory: ${RABBITMQ_MEM_LIMIT:-512M}
        reservations:
          memory: ${RABBITMQ_MEM_RESERVE:-256M}


