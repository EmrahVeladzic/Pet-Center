services:
  mssql:
    mem_limit: 2g
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: mssql
    environment:
      - ACCEPT_EULA=Y    
      - MSSQL_SA_PASSWORD=${SA_PASSWORD}
      - SA_PASSWORD=${SA_PASSWORD}
    ports:
      - "1433:1433"
    volumes:
      - mssql_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$${SA_PASSWORD}\" -C -Q 'SELECT 1'"]
      interval: 20s
      retries: 15

  mssql-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    depends_on:
      mssql:
        condition: service_healthy
    environment:
      - SA_PASSWORD=${SA_PASSWORD}
      - DB_NAME=${DB_NAME}
    volumes:
      - ./DB/PetCenterDB.sql:/PetCenterDB.sql:ro
    entrypoint: >
      bash -c "/opt/mssql-tools18/bin/sqlcmd -S mssql -U sa -P \"$SA_PASSWORD\" -C -v DB_NAME=\"$DB_NAME\" -i /PetCenterDB.sql"
    restart: "no"

volumes:
  mssql_data:
