services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-CU14-ubuntu-22.04
    container_name: mssql
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=${SA_PASSWORD}
    ports:
      - "1433:1433"
    volumes:
      - mssql_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$${SA_PASSWORD}\" -C -Q 'SELECT 1'"]
      interval: 5s
      retries: 15
    networks:
      - petcenter-network
    deploy:
      resources:
        limits:
          memory: ${MSSQL_MEM_LIMIT:-4G}
        reservations:
          memory: ${MSSQL_MEM_RESERVE:-2G}

  mssql-init:
    image: mcr.microsoft.com/mssql/server:2022-CU14-ubuntu-22.04
    depends_on:
      mssql:
        condition: service_healthy
    environment:
      - SA_PASSWORD=${SA_PASSWORD}
      - DB_NAME=${DB_NAME}
    volumes:
      - ./DB/PetCenterDB.sql:/PetCenterDB.sql:ro
    entrypoint: >
      bash -c "/opt/mssql-tools18/bin/sqlcmd -S mssql -U sa -P \"$SA_PASSWORD\" -C -v DB_NAME=\"$DB_NAME\" -i /PetCenterDB.sql"
    restart: "no"
    networks:
      - petcenter-network

  rabbitmq:
    image: rabbitmq:3.13.7-management
    container_name: rabbitmq
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_DEFAULT_USER}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_DEFAULT_PASS}
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - petcenter-network
    deploy:
      resources:
        limits:
          memory: ${RABBITMQ_MEM_LIMIT:-512M}
        reservations:
          memory: ${RABBITMQ_MEM_RESERVE:-256M}
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 5s
      timeout: 5s
      retries: 15

  petcenter-api:
    build:
      context: .
      dockerfile: API/PetCenterAPI/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT}
      - ASPNETCORE_HTTP_PORTS=${ASPNETCORE_HTTP_PORTS:-8080}
      - ConnectionStrings__DefaultConnection=${ConnectionStrings__DefaultConnection}
      - Jwt__Key=${Jwt__Key}
      - Jwt__Issuer=${Jwt__Issuer}
      - Jwt__Audience=${Jwt__Audience}
      - RabbitMQ__HostName=${RabbitMQ__HostName}
      - RabbitMQ__QueueName=${RabbitMQ__QueueName}
      - RabbitMQ__UserName=${RabbitMQ__UserName}
      - RabbitMQ__Password=${RabbitMQ__Password}
      - InstanceOwner__Contact=${InstanceOwner__Contact}
      - InstanceOwner__Password=${InstanceOwner__Password}
      - Seeder__Seed=${Seeder__Seed}
      - Seeder__Static=${Seeder__Static}
      - Cors__AllowedOrigins=${Cors__AllowedOrigins}
    ports:
      - "8080:8080"
    depends_on:
      mssql:
        condition: service_healthy
      mssql-init:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
    networks:
      - petcenter-network
    deploy:
      resources:
        limits:
          memory: ${API_MEM_LIMIT:-512M}
        reservations:
          memory: ${API_MEM_RESERVE:-256M}

  email-consumer:
    build:
      context: .
      dockerfile: API/UserContactConsumer/Dockerfile
    environment:
      - DOTNET_SYSTEM_CONSOLE_ALLOW_ANSI_COLOR_REDIRECTION=true
      - DOTNET_RUNNING_IN_CONTAINER=true
      - STDOUT_LOGGING=true
      - RabbitMQ__HostName=${RabbitMQ__HostName}
      - RabbitMQ__QueueName=${RabbitMQ__QueueName}
      - RabbitMQ__UserName=${RabbitMQ__UserName}
      - RabbitMQ__Password=${RabbitMQ__Password}
      - Email__SmtpServer=${Email__SmtpServer}
      - Email__SmtpPort=${Email__SmtpPort}
      - Email__SmtpUser=${Email__SmtpUser}
      - Email__SmtpPassword=${Email__SmtpPassword}
      - Email__ApplicationEmail=${Email__ApplicationEmail}
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - petcenter-network
    deploy:
      resources:
        limits:
          memory: ${CONSUMER_MEM_LIMIT:-256M}
        reservations:
          memory: ${CONSUMER_MEM_RESERVE:-128M}

  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: mailhog
    environment:
      - MH_STORAGE=memory
      - MH_MAX_MESSAGES=50
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - petcenter-network

networks:
  petcenter-network:
    driver: bridge

volumes:
  mssql_data: